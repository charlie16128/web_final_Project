<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登入｜TeamUp Campus</title>
  <link rel="stylesheet" href="/stylesheets/style.css">
</head>
<body class="auth-page">
  <div id="app" v-cloak>
    <main class="auth-shell">
      <section class="auth-copy">
        <p class="eyebrow">TeamUp Campus</p>
        <h1>登入組隊平台</h1>
        <p>回到你的專題、申請紀錄與留言討論。</p>
      </section>

      <section class="panel auth-card">
        <form class="stack" @submit.prevent="submit">
          <label>Email<input v-model.trim="form.email" type="email" required autofocus></label>
          <label>密碼<input v-model="form.password" type="password" required></label>
          <button type="submit">登入</button>
        </form>
        <p class="auth-link">還沒有帳號？<a href="/register">前往註冊</a></p>
        <p class="auth-link"><a href="/">回專案列表</a></p>
      </section>
    </main>
    <div class="toast" :class="{ show: toast }" role="status" aria-live="polite">{{ toast }}</div>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="/javascripts/auth.js"></script>
</body>
</html>
