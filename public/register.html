<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>註冊 - TeamUp Campus</title>
  <link rel="stylesheet" href="/stylesheets/style.css">
</head>
<body class="auth-page">
  <div id="app" v-cloak>
    <main class="auth-shell">
      <section class="auth-copy">
        <p class="eyebrow">TeamUp Campus</p>
        <h1>建立你的帳號</h1>
        <p>使用學號與 Email 註冊，開始尋找課程專題夥伴。</p>
      </section>

      <section class="panel auth-card">
        <form class="stack" @submit.prevent="submit">
          <label>
            姓名
            <input v-model.trim="form.name" required autofocus autocomplete="name">
          </label>
          <label>
            學號
            <input
              v-model.trim="form.student_id"
              required
              minlength="8"
              maxlength="8"
              pattern="D[0-9]{7}"
              title="學號格式不正確 ex:D1234567"
            >
          </label>
          <label>
            Email
            <input v-model.trim="form.email" type="email" required autocomplete="email">
          </label>
          <label>
            密碼
            <input
              v-model="form.password"
              type="password"
              required
              minlength="6"
              pattern="[A-Za-z0-9]{6,}"
              title="密碼至少 6 位，且只能使用英文字母與數字"
              autocomplete="new-password"
            >
          </label>
          <button type="submit">註冊</button>
        </form>
        <p class="auth-link">已經有帳號？<a href="/login">前往登入</a></p>
        <p class="auth-link"><a href="/">回到首頁</a></p>
      </section>
    </main>
    <div class="toast" :class="{ show: toast }" role="status" aria-live="polite">{{ toast }}</div>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="/javascripts/auth.js"></script>
</body>
</html>
